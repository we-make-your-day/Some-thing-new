<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For My Favorite Person 💕</title>
  <meta name="description" content="A heartfelt love message made just for you." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Floating Particles Canvas -->
  <canvas id="particleCanvas"></canvas>

  <!-- ===== SCREEN 1: OPENING ===== -->
  <section id="screen-opening" class="screen active">
    <div class="screen-inner">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
      <div class="opening-card glass-card">
        <div class="heart-icon pulse-heart">♥</div>
        <h1 class="title-main">For My<br /><em>Favorite Person</em></h1>
        <p class="subtitle">I made this just for you</p>
        <div class="divider-line"></div>
        <button id="btn-open-heart" class="cta-btn" onclick="startJourney()">
          <span class="btn-icon">💌</span>
          <span>Open My Heart</span>
        </button>
      </div>
    </div>
  </section>

  <!-- ===== SCREEN 2: CARD SEQUENCE ===== -->
  <section id="screen-cards" class="screen">
    <div class="screen-inner">
      <div class="glow-orb orb-3"></div>
      <div class="progress-dots" id="progress-dots"></div>

      <div class="card-stage" id="card-stage">
        <!-- Cards injected by JS -->
      </div>

      <div class="card-nav">
        <button id="btn-next-card" class="nav-btn" onclick="nextCard()">
          <span>Next</span>
          <span class="nav-arrow">→</span>
        </button>
      </div>
    </div>
  </section>

  <!-- ===== SCREEN 3: PERSONAL REVEAL ===== -->
  <section id="screen-reveal" class="screen">
    <div class="screen-inner">
      <div class="glow-orb orb-big"></div>
      <div class="reveal-card glass-card premium">
        <div class="heart-burst-container" id="heart-burst"></div>
        <p class="reveal-prelude">I don't need a special day to tell you this...</p>
        <div class="reveal-divider"></div>
        <h2 class="reveal-main">I love you,</h2>
        <h2 class="reveal-name" id="partner-name">My Love</h2>
        <p class="reveal-sub">More than words could ever hold.</p>
      </div>
      <button class="nav-btn glow-btn" onclick="showFinal()" style="margin-top:2rem;">
        <span>Continue</span>
        <span class="nav-arrow">→</span>
      </button>
    </div>
  </section>

  <!-- ===== SCREEN 4: FINAL ===== -->
  <section id="screen-final" class="screen">
    <div class="screen-inner">
      <div class="glow-orb orb-4"></div>
      <div class="final-card glass-card">
        <div class="final-hearts" id="final-hearts"></div>
        <div class="forever-icon">♾️</div>
        <h2 class="final-title">Forever starts<br /><em>with you.</em></h2>
        <p class="final-sub">Thank you for being my everything.</p>
        <div class="final-buttons">
          <button class="cta-btn secondary" id="btn-say-back" onclick="sayBack()">
            <span class="btn-icon">💬</span>
            <span>Say it back</span>
          </button>
          <button class="cta-btn ghost" onclick="playAgain()">
            <span class="btn-icon">🔁</span>
            <span>Play again</span>
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== SAY IT BACK MODAL ===== -->
  <div id="say-back-modal" class="modal-overlay" style="display:none;" onclick="closeModal(event)">
    <div class="modal-card glass-card">
      <div class="modal-heart">💕</div>
      <h3 class="modal-title">They said it back!</h3>
      <p class="modal-msg">"I love you too,<br />more than you know."</p>
      <button class="cta-btn" onclick="closeSayBack()">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
